name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  SQLX_OFFLINE: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            cuda: false
            args: '--bundles app,dmg'
            name: macos
          - platform: windows-2022
            cuda: false
            args: '--bundles msi,nsis'
            name: windows-cpu
          - platform: windows-2022
            cuda: true
            args: '--features cuda --bundles msi,nsis'
            name: windows-cuda
          - platform: ubuntu-latest
            cuda: false
            args: '--bundles deb'
            name: linux-cpu
          - platform: ubuntu-latest
            cuda: true
            args: '--features cuda --bundles deb'
            name: linux-cuda
    runs-on: ${{ matrix.platform }}
    name: build (${{ matrix.name }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Set up MSVC Developer Command Prompt
        if: matrix.cuda && matrix.platform == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          vsversion: '2022'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set CUDA environment variables
        if: matrix.cuda
        shell: bash
        run: |
          echo "CUDARC_CUDA_VERSION=12040" >> $GITHUB_ENV
          echo "CUDA_COMPUTE_CAP=80" >> $GITHUB_ENV
          echo "NVCC_APPEND_FLAGS=-allow-unsupported-compiler" >> $GITHUB_ENV

      - name: Install CUDA Toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.4.0'

      - name: Build and release (CPU)
        if: ${{ !matrix.cuda }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: 'plinth: ${{ needs.release-please.outputs.tag_name }}'
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          includeUpdater: true
          args: ${{ matrix.args }}

      - name: Build (CUDA)
        if: ${{ matrix.cuda }}
        run: bunx tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Rename CUDA artifacts (windows)
        if: ${{ matrix.cuda && matrix.platform == 'windows-2022' }}
        shell: pwsh
        run: |
          Get-ChildItem src-tauri/target/release/bundle/msi/*, src-tauri/target/release/bundle/nsis/* | ForEach-Object {
              $newName = $_.Name -replace "Plinth_(\d+\.\d+\.\d+)_", "Plinth_`$1-cuda_"
              if ($_.Name -ne $newName) {
                  Rename-Item $_.FullName -NewName $newName
              }
          }

      - name: Rename CUDA artifacts (linux)
        if: ${{ matrix.cuda && matrix.platform == 'ubuntu-latest' }}
        run: |
          for f in src-tauri/target/release/bundle/deb/*; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            new_base=$(echo "$base" | sed -E 's/plinth_([0-9]+\.[0-9]+\.[0-9]+)_/plinth_\1_cuda_/')
            if [ "$base" != "$new_base" ]; then
              mv "$f" "$(dirname "$f")/$new_base"
            fi
          done

      - name: Upload CUDA artifacts
        if: ${{ matrix.cuda }}
        uses: softprops/action-gh-release@v3
        with:
          files: |
            src-tauri/target/release/bundle/msi/*-cuda*
            src-tauri/target/release/bundle/nsis/*-cuda*
            src-tauri/target/release/bundle/deb/*-cuda*
          tag_name: ${{ needs.release-please.outputs.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
