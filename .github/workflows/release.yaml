name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  SQLX_OFFLINE: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            cuda: false
            args: '--bundles app,dmg'
            name: macos
          - platform: windows-2022
            cuda: false
            args: '--bundles msi,nsis'
            name: windows-cpu
          - platform: windows-2022
            cuda: true
            args: '--features cuda --bundles msi,nsis'
            name: windows-cuda
          - platform: ubuntu-latest
            cuda: false
            args: '--bundles deb'
            name: linux-cpu
          - platform: ubuntu-latest
            cuda: true
            args: '--features cuda --bundles deb'
            name: linux-cuda
    runs-on: ${{ matrix.platform }}
    name: build (${{ matrix.name }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Set up MSVC Developer Command Prompt
        if: matrix.cuda && matrix.platform == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          vsversion: '2022'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set CUDA environment variables
        if: matrix.cuda
        shell: bash
        run: |
          echo "CUDARC_CUDA_VERSION=12040" >> $GITHUB_ENV
          echo "CUDA_COMPUTE_CAP=80" >> $GITHUB_ENV
          echo "NVCC_APPEND_FLAGS=-allow-unsupported-compiler" >> $GITHUB_ENV

      - name: Install CUDA Toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.4.0'

      - name: Customize product name for CUDA build
        if: matrix.cuda
        shell: bash
        run: |
          bun -e "
            const fs = require('fs');
            const file = 'src-tauri/tauri.conf.json';
            const config = JSON.parse(fs.readFileSync(file, 'utf8'));
            config.productName = 'Plinth-cuda';
            fs.writeFileSync(file, JSON.stringify(config, null, 2));
          "

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: 'plinth: ${{ needs.release-please.outputs.tag_name }}'
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          includeUpdater: true
          args: ${{ matrix.args }}
